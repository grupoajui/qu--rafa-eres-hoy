<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAFA KOMBAT</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --negro: #0D0D0D;
  --amarillo: #F5C518;
  --rojo: #E63946;
  --azul: #3A86FF;
  --verde: #2DC653;
  --gris: #1A1A1A;
  --gris2: #252525;
  --gris3: #333;
  --blanco: #F0EDE8;
}

body {
  background: var(--negro);
  color: var(--blanco);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem 3rem;
}

/* ── HEADER ── */
.titulo-juego {
  font-family: 'Anton', sans-serif;
  font-size: clamp(2.5rem, 10vw, 5rem);
  letter-spacing: 0.05em;
  text-align: center;
  line-height: 1;
  margin-bottom: 0.25rem;
}
.titulo-juego .k { color: var(--rojo); }
.titulo-juego .r { color: var(--amarillo); }

.subtitulo {
  font-size: 0.72rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0.4;
  text-align: center;
  margin-bottom: 2rem;
}

/* ── SCREENS ── */
.screen { display: none; width: 100%; max-width: 640px; }
.screen.activo { display: block; }

/* ── SELECTOR DE RIVAL ── */
.selector-titulo {
  font-family: 'Anton', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.15em;
  color: var(--amarillo);
  text-align: center;
  margin-bottom: 1rem;
  text-transform: uppercase;
}

.rivales-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 0.75rem;
}

.rival-card {
  background: var(--gris);
  border: 2px solid var(--gris3);
  border-radius: 8px;
  padding: 1rem 0.75rem;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  align-items: center;
}
.rival-card:hover { border-color: var(--amarillo); transform: translateY(-2px); }

.rival-emoji { font-size: 2.2rem; }
.rival-nombre { font-family: 'Anton', sans-serif; font-size: 1rem; letter-spacing: 0.05em; }
.rival-habilidad {
  font-size: 0.62rem;
  color: var(--amarillo);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  opacity: 0.8;
  line-height: 1.3;
}
.rival-stats-mini {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 0.2rem;
}
.stat-pill {
  font-size: 0.58rem;
  background: var(--gris2);
  padding: 0.1rem 0.4rem;
  border-radius: 20px;
  opacity: 0.7;
  white-space: nowrap;
}

/* ── ARENA ── */
.arena {
  background: var(--gris);
  border-radius: 10px;
  overflow: hidden;
  border: 2px solid var(--gris3);
}

/* Barra de vida */
.vidas-row {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 1rem 1.25rem 0.75rem;
  gap: 0.75rem;
  background: #111;
}

.luchador-info { display: flex; flex-direction: column; gap: 0.2rem; }
.luchador-info.derecha { text-align: right; align-items: flex-end; }

.luchador-nombre-arena {
  font-family: 'Anton', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.05em;
}
.luchador-nombre-arena.rafa { color: var(--amarillo); }
.luchador-nombre-arena.rival { color: var(--rojo); }

.habilidad-tag {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.6;
}

.barra-vida-wrap {
  width: 100%;
  height: 12px;
  background: var(--gris3);
  border-radius: 6px;
  overflow: hidden;
}
.barra-vida {
  height: 100%;
  border-radius: 6px;
  transition: width 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
}
.barra-vida.rafa-barra { background: linear-gradient(90deg, var(--amarillo), #ffdd57); }
.barra-vida.rival-barra { background: linear-gradient(90deg, var(--rojo), #ff6b6b); }
.luchador-info.derecha .barra-vida-wrap { direction: rtl; }

.vs-arena {
  font-family: 'Anton', sans-serif;
  font-size: 1.2rem;
  color: var(--gris3);
  white-space: nowrap;
  padding: 0 0.25rem;
}

.ronda-badge {
  text-align: center;
  padding: 0.4rem;
  background: #111;
  border-top: 1px solid var(--gris3);
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amarillo);
  opacity: 0.7;
}

/* Escenario animado */
.escenario {
  padding: 1.5rem 1.25rem;
  min-height: 160px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

.luchadores-display {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}

.luchador-sprite {
  font-size: 4rem;
  transition: transform 0.3s;
  position: relative;
}

.luchador-sprite.atacando { animation: atacar 0.4s ease; }
.luchador-sprite.recibiendo { animation: recibir 0.4s ease; }
.luchador-sprite.temblando { animation: temblar 0.3s ease 3; }

@keyframes atacar {
  0%   { transform: translateX(0) scale(1); }
  40%  { transform: translateX(30px) scale(1.2); }
  100% { transform: translateX(0) scale(1); }
}
@keyframes recibir {
  0%   { transform: translateX(0); }
  25%  { transform: translateX(-15px) rotate(-10deg); }
  75%  { transform: translateX(10px) rotate(5deg); }
  100% { transform: translateX(0) rotate(0); }
}
@keyframes atacar-rival {
  0%   { transform: translateX(0) scale(1); }
  40%  { transform: translateX(-30px) scale(1.2); }
  100% { transform: translateX(0) scale(1); }
}
@keyframes temblar {
  0%, 100% { transform: translateX(0); }
  33%  { transform: translateX(-4px) rotate(-3deg); }
  66%  { transform: translateX(4px) rotate(3deg); }
}

.luchador-sprite.rival-atacando { animation: atacar-rival 0.4s ease; }

.narrativa-situacion {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(13,13,13,0.92);
  padding: 1rem;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.situacion-texto {
  font-size: 0.9rem;
  line-height: 1.55;
  max-width: 420px;
  text-align: center;
  margin-bottom: 1rem;
}

.situacion-texto .destacado {
  color: var(--amarillo);
  font-weight: 700;
}

/* Opciones de respuesta */
.opciones-wrap {
  padding: 0 1.25rem 1.25rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.opcion-btn {
  background: var(--gris2);
  border: 2px solid var(--gris3);
  border-radius: 6px;
  padding: 0.75rem 1rem;
  color: var(--blanco);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  text-align: left;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  line-height: 1.35;
}
.opcion-btn:hover:not(:disabled) { border-color: var(--amarillo); background: #2a2600; }
.opcion-btn:disabled { cursor: not-allowed; opacity: 0.6; }
.opcion-btn.ganadora { border-color: var(--verde); background: rgba(45,198,83,0.15); }
.opcion-btn.perdedora { border-color: var(--rojo); background: rgba(230,57,70,0.1); }
.opcion-btn.elegida-mal { border-color: var(--rojo); background: rgba(230,57,70,0.2); }

.opcion-emoji { font-size: 1.1rem; flex-shrink: 0; }
.opcion-efecto {
  font-size: 0.68rem;
  color: var(--amarillo);
  margin-top: 0.2rem;
  display: none;
}
.opcion-btn.ganadora .opcion-efecto,
.opcion-btn.perdedora .opcion-efecto,
.opcion-btn.elegida-mal .opcion-efecto { display: block; }

/* Resultado ronda */
.resultado-ronda {
  margin: 0 1.25rem 1rem;
  padding: 0.75rem 1rem;
  border-radius: 6px;
  font-size: 0.85rem;
  line-height: 1.5;
  display: none;
  animation: fadeIn 0.3s ease;
}
.resultado-ronda.bien { background: rgba(45,198,83,0.15); border: 1px solid var(--verde); }
.resultado-ronda.mal  { background: rgba(230,57,70,0.12); border: 1px solid var(--rojo); }
.resultado-ronda.neutral { background: var(--gris2); border: 1px solid var(--gris3); }

.btn-siguiente-ronda {
  display: none;
  margin: 0 1.25rem 1.25rem;
  width: calc(100% - 2.5rem);
  background: var(--amarillo);
  color: var(--negro);
  border: none;
  font-family: 'Anton', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  padding: 0.75rem;
  border-radius: 6px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-siguiente-ronda:hover { opacity: 0.85; }

/* ── PANTALLA FINAL ── */
#screen-final {
  text-align: center;
}

.final-titulo {
  font-family: 'Anton', sans-serif;
  font-size: clamp(2rem, 8vw, 4rem);
  line-height: 1;
  margin-bottom: 0.75rem;
}

.final-subtitulo {
  font-size: 0.9rem;
  opacity: 0.7;
  margin-bottom: 1.5rem;
  line-height: 1.5;
  max-width: 400px;
  margin-left: auto;
  margin-right: auto;
}

.final-stats {
  background: var(--gris);
  border-radius: 8px;
  padding: 1.25rem;
  margin-bottom: 1.5rem;
  text-align: left;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.final-stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.82rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--gris3);
}
.final-stat-row:last-child { border-bottom: none; padding-bottom: 0; }
.final-stat-label { opacity: 0.6; }
.final-stat-val { font-weight: 700; color: var(--amarillo); }

.btn-replay {
  background: var(--rojo);
  color: white;
  border: none;
  font-family: 'Anton', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.08em;
  padding: 0.85rem 2.5rem;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 0.75rem;
  transition: opacity 0.2s;
}
.btn-replay:hover { opacity: 0.85; }

.btn-cambiar {
  background: transparent;
  border: 1px solid var(--gris3);
  color: var(--blanco);
  font-family: 'Inter', sans-serif;
  font-size: 0.82rem;
  padding: 0.5rem 1.5rem;
  border-radius: 6px;
  cursor: pointer;
  opacity: 0.6;
  transition: opacity 0.2s;
  display: block;
  margin: 0 auto;
}
.btn-cambiar:hover { opacity: 1; }

/* ── ALCOHOL TWIST ── */
.alcohol-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(245,197,24,0.08);
  z-index: 50;
  pointer-events: none;
  animation: alcoholPulse 1s ease infinite alternate;
}
@keyframes alcoholPulse {
  from { background: rgba(245,197,24,0.04); }
  to   { background: rgba(245,197,24,0.15); }
}

.damage-float {
  position: fixed;
  font-family: 'Anton', sans-serif;
  font-size: 2rem;
  pointer-events: none;
  z-index: 200;
  animation: floatUp 0.9s ease forwards;
}
@keyframes floatUp {
  0%   { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
}
</style>
</head>
<body>

<div class="titulo-juego">
  <span class="r">RAFA</span> <span class="k">KOM</span><span>BAT</span>
</div>
<p class="subtitulo">El torneo definitivo de la pandilla</p>

<!-- PANTALLA 1: Selector rival -->
<div class="screen activo" id="screen-selector">
  <p class="selector-titulo">⚔️ Elige tu rival</p>
  <div class="rivales-grid" id="rivales-grid"></div>
</div>

<!-- PANTALLA 2: Arena de combate -->
<div class="screen" id="screen-arena">
  <div class="arena">

    <!-- Barras de vida -->
    <div class="vidas-row">
      <div class="luchador-info">
        <span class="luchador-nombre-arena rafa">RAFA</span>
        <span class="habilidad-tag" id="habilidad-rafa-tag"></span>
        <div class="barra-vida-wrap">
          <div class="barra-vida rafa-barra" id="barra-rafa" style="width:100%"></div>
        </div>
      </div>
      <div class="vs-arena">VS</div>
      <div class="luchador-info derecha">
        <span class="luchador-nombre-arena rival" id="nombre-rival-arena"></span>
        <span class="habilidad-tag" id="habilidad-rival-tag"></span>
        <div class="barra-vida-wrap">
          <div class="barra-vida rival-barra" id="barra-rival" style="width:100%"></div>
        </div>
      </div>
    </div>

    <div class="ronda-badge" id="ronda-badge">RONDA 1 DE 5</div>

    <!-- Escenario -->
    <div class="escenario">
      <div class="luchadores-display" id="luchadores-display">
        <div class="luchador-sprite" id="sprite-rafa">😤</div>
        <div style="font-family:Anton,sans-serif;font-size:1.5rem;color:#333">⚡</div>
        <div class="luchador-sprite" id="sprite-rival">❓</div>
      </div>

      <div class="narrativa-situacion" id="narrativa" style="display:none">
        <div class="situacion-texto" id="situacion-texto"></div>
      </div>
    </div>

    <!-- Resultado de ronda -->
    <div class="resultado-ronda" id="resultado-ronda"></div>

    <!-- Opciones -->
    <div class="opciones-wrap" id="opciones-wrap"></div>

    <!-- Siguiente -->
    <button class="btn-siguiente-ronda" id="btn-siguiente" onclick="siguienteRonda()">Siguiente ronda ▶</button>

  </div>
</div>

<!-- PANTALLA 3: Final -->
<div class="screen" id="screen-final">
  <div class="final-titulo" id="final-titulo"></div>
  <p class="final-subtitulo" id="final-subtitulo"></p>
  <div class="final-stats" id="final-stats"></div>
  <button class="btn-replay" onclick="revancha()">🔄 REVANCHA</button>
  <button class="btn-cambiar" onclick="volverSelector()">← Cambiar rival</button>
</div>

<div class="alcohol-overlay" id="alcohol-overlay"></div>

<script>

//  DATOS
// ══════════════════════════════════════════════════════

  emoji: "😤",

  {

        { emoji: "🚪", texto: "Dejarle ir. Es lo que hace Pedro.", buena: false, efecto: "Pedro se va. Rafa pierde por default moral." },

// ══════════════════════════════════════════════════════
//  ESTADO DEL JUEGO
// ══════════════════════════════════════════════════════

let rivalActual = null;
let situaciones = [];
let rondaActual = 0;
let vidaRafa = 100;
let vidaRival = 100;
let aciertos = 0;
let victoriasTech = 0; // veces que Rafa "gana" una ronda
let alcoholAccumulado = 0;

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════

function init() {
  const grid = document.getElementById('rivales-grid');
  grid.innerHTML = '';
  RIVALES.forEach(r => {
    const card = document.createElement('div');
    card.className = 'rival-card';
    card.innerHTML = `
      <div class="rival-emoji">${r.emoji}</div>
      <div class="rival-nombre">${r.nombre}</div>
      <div class="rival-habilidad">⚡ ${r.habilidad}</div>
      <div class="rival-stats-mini">
        <span class="stat-pill">💪 ${r.stats.fuerza}</span>
        <span class="stat-pill">🏃 ${r.stats.velocidad}</span>
        <span class="stat-pill">🛡 ${r.stats.resistencia}</span>
        <span class="stat-pill">💬 ${r.stats.labia}</span>
      </div>`;
    card.onclick = () => iniciarCombate(r);
    grid.appendChild(card);
  });
}

function iniciarCombate(rival) {
  rivalActual = rival;
  situaciones = getSituaciones(RAFA, rival);
  rondaActual = 0;
  vidaRafa = 100;
  vidaRival = 100;
  aciertos = 0;
  victoriasTech = 0;
  alcoholAccumulado = 0;

  // Setup arena
  document.getElementById('nombre-rival-arena').textContent = rival.nombre;
  document.getElementById('habilidad-rafa-tag').textContent = `⚡ ${RAFA.habilidad}`;
  document.getElementById('habilidad-rival-tag').textContent = `⚡ ${rival.habilidad}`;
  document.getElementById('sprite-rafa').textContent = RAFA.emoji;
  document.getElementById('sprite-rival').textContent = rival.emoji;
  document.getElementById('barra-rafa').style.width = '100%';
  document.getElementById('barra-rival').style.width = '100%';
  document.getElementById('narrativa').style.display = 'none';
  document.getElementById('btn-siguiente').style.display = 'none';
  document.getElementById('resultado-ronda').style.display = 'none';
  document.getElementById('opciones-wrap').innerHTML = '';

  mostrarScreen('screen-arena');
  setTimeout(() => cargarRonda(), 400);
}

function cargarRonda() {
  if (rondaActual >= situaciones.length) { finCombate(); return; }

  const sit = situaciones[rondaActual];
  const esEspecial = situaciones[rondaActual] && situaciones[rondaActual].esEspecial;
  document.getElementById('ronda-badge').textContent = esEspecial
    ? '⚡ RONDA FINAL — MOVIMIENTO ESPECIAL ⚡'
    : `RONDA ${rondaActual + 1} DE ${situaciones.length}`;
  document.getElementById('ronda-badge').style.color = esEspecial ? 'var(--rojo)' : 'var(--amarillo)';

  // Mostrar narrativa
  document.getElementById('situacion-texto').innerHTML = sit.texto;
  document.getElementById('narrativa').style.display = 'flex';

  // Animar sprites
  setTimeout(() => {
    document.getElementById('narrativa').style.display = 'none';
    mostrarOpciones(sit);
  }, 4500);
}

function mostrarOpciones(sit) {
  const wrap = document.getElementById('opciones-wrap');
  wrap.innerHTML = '';
  document.getElementById('resultado-ronda').style.display = 'none';
  document.getElementById('btn-siguiente').style.display = 'none';

  // Siempre mezclar opciones para que no sea siempre la primera la buena
  const opsMezcladas = shuffle([...sit.opciones]);

  opsMezcladas.forEach(op => {
    const btn = document.createElement('button');
    btn.className = 'opcion-btn';
    btn.innerHTML = `
      <span class="opcion-emoji">${op.emoji}</span>
      <div>
        <div>${op.texto}</div>
        <div class="opcion-efecto">${op.efecto}</div>
      </div>`;
    btn.onclick = () => resolverRonda(op, sit, opsMezcladas, btn);
    wrap.appendChild(btn);
  });
}

function resolverRonda(elegida, sit, todasOps, btnElegido) {
  // Deshabilitar todas
  document.querySelectorAll('.opcion-btn').forEach(b => b.disabled = true);

  const buenas = todasOps.filter(o => o.buena);
  const elegidaBuena = elegida.buena;

  // Marcar opciones
  document.querySelectorAll('.opcion-btn').forEach((b, i) => {
    const op = todasOps[i];
    if (op.buena) b.classList.add('ganadora');
    else if (b === btnElegido && !op.buena) b.classList.add('elegida-mal');
  });

  // Calcular daño con algo de azar + stats
  const dañoBase = 18 + Math.floor(Math.random() * 10);

  let resultadoTipo, resultadoTexto;

  if (elegidaBuena) {
    aciertos++;
    victoriasTech++;
    vidaRival = Math.max(0, vidaRival - dañoBase);

    // Twist del alcohol: si Rafa lleva muchas victorias, el alcoholismo puede traicionarle
    alcoholAccumulado += Math.floor(Math.random() * 15) + 5;
    const twistAlcohol = victoriasTech >= 2 && alcoholAccumulado > 40 && Math.random() < 0.45;

    if (twistAlcohol) {
      // Rafa gana la ronda pero el alcohol le pasa factura
      vidaRafa = Math.max(0, vidaRafa - 12);
      alcoholAccumulado = 0;
      resultadoTipo = 'neutral';
      resultadoTexto = `✅ Rafa ejecuta perfecto... pero lleva demasiadas cañas. <strong style="color:var(--amarillo)">El alcoholismo le pasa factura (-12 vida)</strong>. Victoria pírrica.`;
      animarSprite('sprite-rival', 'recibiendo');
      animarSprite('sprite-rafa', 'temblando');
      mostrarDamage('🍺', true);
    } else {
      resultadoTipo = 'bien';
      resultadoTexto = `✅ <strong>${elegida.efecto}</strong> — Rafa suma ${dañoBase} puntos de daño.`;
      animarSprite('sprite-rafa', 'atacando');
      animarSprite('sprite-rival', 'recibiendo');
      mostrarDamage(`-${dañoBase}`, false);
    }
  } else {
    vidaRafa = Math.max(0, vidaRafa - dañoBase);
    alcoholAccumulado += 8;
    resultadoTipo = 'mal';
    resultadoTexto = `❌ <strong>${elegida.efecto}</strong> — ${rivalActual.nombre} aprovecha y hace ${dañoBase} de daño a Rafa.`;
    animarSprite('sprite-rival', 'rival-atacando');
    animarSprite('sprite-rafa', 'recibiendo');
    mostrarDamage(`-${dañoBase}`, true);
  }

  // Actualizar barras
  setTimeout(() => {
    document.getElementById('barra-rafa').style.width = vidaRafa + '%';
    document.getElementById('barra-rival').style.width = vidaRival + '%';

    const res = document.getElementById('resultado-ronda');
    res.className = `resultado-ronda ${resultadoTipo}`;
    res.innerHTML = resultadoTexto;
    res.style.display = 'block';

    // ¿Combate terminado?
    if (vidaRafa <= 0 || vidaRival <= 0) {
      setTimeout(() => finCombate(), 1200);
    } else {
      rondaActual++;
      if (rondaActual < situaciones.length) {
        document.getElementById('btn-siguiente').style.display = 'block';
      } else {
        setTimeout(() => finCombate(), 1200);
      }
    }
  }, 300);
}

function siguienteRonda() {
  document.getElementById('opciones-wrap').innerHTML = '';
  document.getElementById('resultado-ronda').style.display = 'none';
  document.getElementById('btn-siguiente').style.display = 'none';
  cargarRonda();
}

// ══════════════════════════════════════════════════════
//  FIN DEL COMBATE
// ══════════════════════════════════════════════════════

function finCombate() {
  const rafaGana = vidaRafa > vidaRival;
  const empate = vidaRafa === vidaRival;

  // El twist de alcoholismo para el resultado final
  const alcoholTwist = rafaGana && aciertos >= 3 && Math.random() < 0.55;

  let titulo, subtitulo;

  if (alcoholTwist) {
    titulo = `<span style="color:var(--amarillo)">RAFA GANA...</span><br><span style="color:var(--rojo);font-size:0.65em">pero acaba en el suelo igual</span>`;
    subtitulo = `Rafa dominó el combate, pero las ${Math.floor(Math.random()*8)+10} cervezas de la noche acabaron haciendo más daño que ${rivalActual.nombre}. Victoria técnica. Derrota vital.`;
  } else if (empate) {
    titulo = `<span style="color:var(--amarillo)">EMPATE</span>`;
    subtitulo = `Nadie gana. Nadie pierde. Acaban los dos en el bar de al lado.`;
  } else if (rafaGana) {
    titulo = `<span style="color:var(--verde)">¡RAFA GANA!</span>`;
    subtitulo = `${rivalActual.nombre} no pudo con el ${RAFA.habilidad}. Victoria aplastante.`;
  } else {
    titulo = `<span style="color:var(--rojo)">${rivalActual.nombre.toUpperCase()} GANA</span>`;
    subtitulo = `El ${rivalActual.habilidad} fue definitivo. Rafa tendrá revancha (ya lo sabes).`;
  }

  document.getElementById('final-titulo').innerHTML = titulo;
  document.getElementById('final-subtitulo').textContent = subtitulo;

  document.getElementById('final-stats').innerHTML = `
    <div class="final-stat-row">
      <span class="final-stat-label">Vida final de Rafa</span>
      <span class="final-stat-val">${Math.max(0, vidaRafa)}%</span>
    </div>
    <div class="final-stat-row">
      <span class="final-stat-label">Vida final de ${rivalActual.nombre}</span>
      <span class="final-stat-val">${Math.max(0, vidaRival)}%</span>
    </div>
    <div class="final-stat-row">
      <span class="final-stat-label">Decisiones correctas</span>
      <span class="final-stat-val">${aciertos} / ${situaciones.length}</span>
    </div>
    <div class="final-stat-row">
      <span class="final-stat-label">Cervezas imaginarias consumidas</span>
      <span class="final-stat-val">${Math.floor(alcoholAccumulado / 10) + 4} 🍺</span>
    </div>
    <div class="final-stat-row">
      <span class="final-stat-label">Habilidad especial de Rafa</span>
      <span class="final-stat-val">${RAFA.habilidad}</span>
    </div>`;

  mostrarScreen('screen-final');
}

function revancha() {
  iniciarCombate(rivalActual);
}

function volverSelector() {
  mostrarScreen('screen-selector');
}

// ══════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════

function mostrarScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('activo'));
  document.getElementById(id).classList.add('activo');
}

function animarSprite(id, clase) {
  const el = document.getElementById(id);
  el.classList.remove('atacando', 'recibiendo', 'temblando', 'rival-atacando');
  void el.offsetWidth;
  el.classList.add(clase);
  setTimeout(() => el.classList.remove(clase), 500);
}

function mostrarDamage(texto, esRafa) {
  const sprite = document.getElementById(esRafa ? 'sprite-rafa' : 'sprite-rival');
  const rect = sprite.getBoundingClientRect();
  const d = document.createElement('div');
  d.className = 'damage-float';
  d.textContent = texto;
  d.style.cssText = `
    left: ${rect.left + rect.width/2 - 20}px;
    top: ${rect.top - 10}px;
    color: ${esRafa ? 'var(--rojo)' : 'var(--verde)'};
  `;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 1000);
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// Arrancar
init();
</script>
